<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050505">
<title>PLUGSA | Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#050505; --surface:#111111; --accent:#f7ff00; --text:#ffffff; --muted:#b3b3b3; --border:rgba(255,255,255,.12); }
* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; font-size:clamp(14px,1.1vw,18px); }
body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
a { color:inherit; text-decoration:none; }
button { font:inherit; }
.navbar { position:sticky; top:0; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:clamp(16px,2vw,28px) clamp(4%,3vw,8%); background:rgba(5,5,5,.94); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
.logo { font-size:1.7rem; font-weight:800; letter-spacing:.36em; text-transform:uppercase; color:var(--accent); }
.nav-links { display:flex; gap:20px; align-items:center; }
.nav-links a { color:var(--text); font-weight:500; transition:.25s ease; }
.nav-links a:hover,.nav-links a.active { color:var(--accent); }
.cart-pill { background:rgba(247,255,0,.14); padding:8px 12px; border-radius:999px; border:1px solid rgba(247,255,0,.18); display:inline-flex; align-items:center; gap:6px; }
.page { padding:clamp(60px,7vw,90px) clamp(6%,4vw,8%) clamp(60px,8vw,90px); }
.page h1 { font-size:clamp(2rem, 4vw, 3.2rem); text-align:center; margin-bottom:clamp(24px,2.5vw,32px); color:var(--accent); letter-spacing:.12em; text-transform:uppercase; }
.layout { display:grid; grid-template-columns:1.35fr .65fr; gap:clamp(18px,1.8vw,24px); align-items:start; }
.items { display:flex; flex-direction:column; gap:clamp(16px,1.5vw,20px); }
.item-card { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:clamp(16px,1.5vw,20px); display:flex; gap:clamp(14px,1.4vw,18px); align-items:center; box-shadow:0 16px 45px rgba(0,0,0,.25); }
.item-card img { width:clamp(120px,12vw,140px); height:clamp(120px,12vw,140px); object-fit:cover; border-radius:16px; }
.item-card .details { flex:1; display:flex; flex-direction:column; gap:clamp(8px,1vw,10px); }
.item-card .details h3 { font-size:clamp(1rem,1.5vw,1.08rem); }
.item-card .details p { color:var(--muted); }
.controls { display:flex; gap:clamp(10px,1vw,14px); flex-wrap:wrap; margin-top:clamp(6px,0.8vw,10px); }
.qty-btn, .remove-btn, .checkout-btn { border:none; border-radius:999px; padding:clamp(10px,1vw,14px) clamp(12px,1.2vw,16px); cursor:pointer; font-weight:700; }
.qty-btn { background:#202020; color:var(--text); }
.remove-btn { background:#ff3b3b; color:#ffffff; }
.checkout-btn { background:var(--accent); color:#050505; width:100%; padding:clamp(14px,1.2vw,16px) clamp(16px,1.6vw,18px); }
.summary { background:var(--surface); border:1px solid var(--border); border-radius:24px; padding:clamp(22px,2vw,26px); position:sticky; top:clamp(72px,7vw,92px); }
.summary h2 { margin-bottom:clamp(12px,1vw,14px); }
.summary .line { display:flex; justify-content:space-between; padding:clamp(10px,1vw,12px) 0; color:var(--muted); }
.summary .total { display:flex; justify-content:space-between; padding-top:clamp(12px,1vw,14px); margin-top:clamp(8px,0.8vw,10px); border-top:1px solid var(--border); font-size:clamp(1rem,1.4vw,1.15rem); font-weight:700; }
.empty { text-align:center; padding:clamp(40px,4vw,52px); background:var(--surface); border:1px solid var(--border); border-radius:24px; color:var(--muted); }
@media (max-width:900px) { .layout { grid-template-columns:1fr; } .summary { position:static; } }
@media (max-width:760px) { .navbar { flex-direction:column; gap:12px; padding:16px 6%; } .nav-links { flex-wrap:wrap; justify-content:center; } .page { padding:60px 6% 90px; } .item-card { flex-direction:column; align-items:flex-start; } .item-card img { width:100%; height:220px; } }
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">PLUGSA</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="hoodies.html">Hoodies</a>
    <a href="graphic-tees.html">Graphic Tees</a>
    <a href="fitted caps.html">Caps</a>
    <a href="sneaker.html">Sneakers</a>
    <a class="active cart-pill" href="cart.html">Cart <span data-cart-count>0</span></a>
  </div>
</nav>
<div class="page">
  <h1>Your Cart</h1>
  <div class="layout">
    <div id="cartItems" class="items"></div>
    <aside class="summary">
      <h2>Order Summary</h2>
      <div class="line"><span>Items</span><span id="itemCount">0</span></div>
      <div class="line"><span>Shipping</span><span>Calculated later</span></div>
      <div class="line"><span>Tax</span><span>Included</span></div>
      <div class="total"><span>Total</span><span>R<span id="grandTotal">0.00</span></span></div>
      <button class="checkout-btn" id="checkoutBtn" type="button">Proceed to Checkout</button>
    </aside>
  </div>
</div>
<script>
const storageKey='plugsa-cart';
function readCart(){ try{return JSON.parse(localStorage.getItem(storageKey))||[]}catch(e){return [];} }
function writeCart(cart){ localStorage.setItem(storageKey, JSON.stringify(cart)); }
function updateCartCount(){ const cart=readCart(); document.querySelectorAll('[data-cart-count]').forEach((el)=>{ el.textContent=cart.reduce((total,item)=>total+item.quantity,0); }); }
function renderCart(){
  const cart=readCart();
  const cartItems=document.getElementById('cartItems');
  const grandTotal=document.getElementById('grandTotal');
  const itemCount=document.getElementById('itemCount');
  updateCartCount();
  if(cart.length===0){
    cartItems.innerHTML='<div class="empty"><h2>Your cart is empty</h2><p>Add premium essentials from the store to begin your order.</p></div>';
    grandTotal.textContent='0.00';
    itemCount.textContent='0';
    return;
  }
  let total=0;
  cartItems.innerHTML=cart.map((item,index)=>{
    total += item.price * item.quantity;
    return `<article class="item-card">
      <img src="${item.image}" alt="${item.name}">
      <div class="details">
        <h3>${item.name}</h3>
        <p>${item.color} • ${item.size}</p>
        <p>R${item.price.toLocaleString('en-ZA')} each</p>
        <div class="controls">
          <button class="qty-btn" data-index="${index}" data-action="minus" type="button">−</button>
          <span>${item.quantity}</span>
          <button class="qty-btn" data-index="${index}" data-action="plus" type="button">+</button>
          <button class="remove-btn" data-index="${index}" data-action="remove" type="button">Remove</button>
        </div>
      </div>
    </article>`;
  }).join('');
  grandTotal.textContent=total.toLocaleString('en-ZA', {minimumFractionDigits:2, maximumFractionDigits:2});
  itemCount.textContent=cart.reduce((sum,item)=>sum+item.quantity,0);
}
renderCart();
document.addEventListener('click', (event)=>{
  const button=event.target.closest('button');
  if(!button) return;
  const action=button.dataset.action;
  if(!action) return;
  const cart=readCart();
  const index=Number(button.dataset.index);
  if(action==='plus'){ cart[index].quantity += 1; }
  if(action==='minus'){ cart[index].quantity -= 1; if(cart[index].quantity<=0) cart.splice(index,1); }
  if(action==='remove'){ cart.splice(index,1); }
  writeCart(cart); renderCart();
});
document.getElementById('checkoutBtn').addEventListener('click', ()=>{ alert('Checkout is ready. Your premium PLUGSA order will be processed shortly.'); });
window.addEventListener('storage', renderCart);
window.addEventListener('focus', renderCart);
</script>
</body>
</html>
