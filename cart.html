<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Your Cart | PLUGSA</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            background: #f7f7f7;

            color: #111;

            font-family:
                Arial,
                Helvetica,
                sans-serif;

        }


        /* HEADER */

        .shop-header {

            background: #111;

            color: white;

            padding: 18px 5%;

            display: flex;

            align-items: center;

            justify-content: space-between;

            gap: 20px;

            position: sticky;

            top: 0;

            z-index: 100;

        }


        .logo {

            color: white;

            text-decoration: none;

            font-size: 28px;

            font-weight: 900;

            letter-spacing: -1px;

        }


        .nav-links {

            display: flex;

            align-items: center;

            gap: 24px;

        }


        .nav-links a {

            color: white;

            text-decoration: none;

            font-weight: 600;

        }


        .cart-link {

            color: white;

            text-decoration: none;

            font-weight: bold;

        }


        /* HERO */

        .cart-hero {

            background:

                linear-gradient(

                    90deg,

                    rgba(0,0,0,.9),

                    rgba(0,0,0,.5)

                );

            color: white;

            padding: 65px 6%;

        }


        .cart-hero h1 {

            margin: 0 0 12px;

            font-size:

                clamp(

                    42px,

                    7vw,

                    78px

                );

            line-height: .95;

            letter-spacing: -3px;

        }


        .cart-hero p {

            margin: 0;

            font-size: 18px;

            color: #ddd;

        }


        /* CART AREA */

        .cart-container {

            max-width: 1400px;

            margin: 45px auto;

            padding: 0 5%;

            display: grid;

            grid-template-columns:

                1fr 360px;

            gap: 30px;

            align-items: start;

        }


        .cart-items {

            display: flex;

            flex-direction: column;

            gap: 16px;

        }


        .cart-item {

            background: white;

            border-radius: 14px;

            padding: 18px;

            display: flex;

            gap: 20px;

            align-items: center;

            box-shadow:

                0 5px 20px

                rgba(

                    0,

                    0,

                    0,

                    .05

                );

        }


        .cart-item-image {

            width: 130px;

            height: 150px;

            object-fit: cover;

            border-radius: 10px;

            background: #eee;

        }


        .cart-item-info {

            flex: 1;

        }


        .cart-item-info h3 {

            margin: 0 0 8px;

            font-size: 20px;

        }


        .cart-item-category {

            color: #777;

            font-size: 12px;

            text-transform: uppercase;

            margin-bottom: 10px;

        }


        .cart-item-details {

            color: #555;

            font-size: 14px;

            line-height: 1.8;

        }


        .cart-item-price {

            font-size: 19px;

            font-weight: 900;

            margin-top: 8px;

        }


        .cart-actions {

            display: flex;

            align-items: center;

            gap: 10px;

            margin-top: 14px;

            flex-wrap: wrap;

        }


        .quantity-control {

            display: flex;

            align-items: center;

            border: 1px solid #ddd;

            border-radius: 7px;

            overflow: hidden;

        }


        .quantity-control button {

            width: 34px;

            height: 34px;

            border: none;

            background: #f3f3f3;

            cursor: pointer;

            font-size: 18px;

        }


        .quantity-control span {

            width: 38px;

            text-align: center;

            font-weight: bold;

        }


        .remove-btn {

            border: none;

            background: transparent;

            color: #c0392b;

            cursor: pointer;

            font-weight: bold;

        }


        /* SUMMARY */

        .cart-summary {

            background: white;

            padding: 25px;

            border-radius: 14px;

            box-shadow:

                0 5px 20px

                rgba(

                    0,

                    0,

                    0,

                    .06

                );

            position: sticky;

            top: 100px;

        }


        .cart-summary h2 {

            margin-top: 0;

            font-size: 24px;

        }


        .summary-row {

            display: flex;

            justify-content: space-between;

            padding: 12px 0;

            border-bottom: 1px solid #eee;

        }


        .summary-total {

            display: flex;

            justify-content: space-between;

            padding: 20px 0;

            font-size: 22px;

            font-weight: 900;

        }


        .checkout-btn {

            width: 100%;

            padding: 16px;

            background: #111;

            color: white;

            border: none;

            border-radius: 8px;

            cursor: pointer;

            font-size: 16px;

            font-weight: bold;

        }


        .checkout-btn:hover {

            background: #333;

        }


        .continue-shopping {

            display: block;

            text-align: center;

            margin-top: 15px;

            color: #111;

            text-decoration: none;

            font-weight: bold;

        }


        /* EMPTY CART */

        .empty-cart {

            background: white;

            border-radius: 14px;

            padding: 80px 30px;

            text-align: center;

            box-shadow:

                0 5px 20px

                rgba(

                    0,

                    0,

                    0,

                    .05

                );

        }


        .empty-cart h2 {

            font-size: 30px;

            margin-bottom: 10px;

        }


        .empty-cart p {

            color: #666;

            margin-bottom: 25px;

        }


        .shop-btn {

            display: inline-block;

            background: #111;

            color: white;

            text-decoration: none;

            padding: 14px 25px;

            border-radius: 7px;

            font-weight: bold;

        }


        /* FOOTER */

        footer {

            background: #111;

            color: white;

            text-align: center;

            padding: 35px 20px;

            margin-top: 60px;

        }


        footer a {

            color: white;

            text-decoration: none;

            margin: 0 10px;

        }


        /* MOBILE */

        @media (max-width: 800px) {

            .cart-container {

                grid-template-columns: 1fr;

            }


            .cart-summary {

                position: static;

            }

        }


        @media (max-width: 550px) {

            .shop-header {

                padding: 15px 20px;

            }


            .nav-links {

                gap: 12px;

            }


            .nav-links a:not(.cart-link) {

                display: none;

            }


            .cart-hero {

                padding: 50px 25px;

            }


            .cart-container {

                padding: 0 15px;

                margin-top: 25px;

            }


            .cart-item {

                align-items: flex-start;

                padding: 12px;

                gap: 12px;

            }


            .cart-item-image {

                width: 95px;

                height: 115px;

            }


            .cart-item-info h3 {

                font-size: 16px;

            }


            .cart-item-details {

                font-size: 12px;

            }


            .cart-item-price {

                font-size: 16px;

            }

        }

    </style>

</head>


<body>


<header class="shop-header">

    <a
        href="index.html"
        class="logo"
    >

        PLUGSA

    </a>


    <nav class="nav-links">

        <a href="index.html">

            Home

        </a>


        <a href="shop.html">

            Shop

        </a>


        <a href="hoodies.html">

            Hoodies

        </a>


        <a href="graphic-tees.html">

            Tees

        </a>


        <a href="sneakers.html">

            Sneakers

        </a>


        <a
            href="cart.html"
            class="cart-link"
        >

            Cart (

            <span id="headerCartCount">

                0

            </span>

            )

        </a>

    </nav>

</header>


<section class="cart-hero">

    <h1>

        YOUR CART.

    </h1>


    <p>

        Your selected pieces, ready for checkout.

    </p>

</section>


<main class="cart-container">


    <section id="cartItems">

        <!-- PRODUCTS LOAD HERE -->

    </section>


    <aside class="cart-summary">


        <h2>

            Order Summary

        </h2>


        <div class="summary-row">

            <span>

                Items

            </span>


            <strong id="totalItems">

                0

            </strong>

        </div>


        <div class="summary-row">

            <span>

                Subtotal

            </span>


            <strong id="subtotal">

                R0.00

            </strong>

        </div>


        <div class="summary-row">

            <span>

                Delivery

            </span>


            <strong>

                Calculated at checkout

            </strong>

        </div>


        <div class="summary-total">

            <span>

                Total

            </span>


            <span id="total">

                R0.00

            </span>

        </div>


        <button
            id="checkoutBtn"
            class="checkout-btn"
        >

            Proceed to Checkout

        </button>


        <a
            href="shop.html"
            class="continue-shopping"
        >

            Continue Shopping

        </a>


    </aside>


</main>


<footer>

    <p>

        &copy; 2026 PLUGSA.

        All rights reserved.

    </p>


    <div>

        <a href="index.html">

            Home

        </a>


        <a href="admin.html">

            Admin

        </a>


        <a href="refer.html">

            Refer a friend

        </a>

    </div>

</footer>


<script>


const storageKey = "plugsa-cart";


const cartItems =
    document.getElementById(
        "cartItems"
    );


const totalItems =
    document.getElementById(
        "totalItems"
    );


const subtotal =
    document.getElementById(
        "subtotal"
    );


const total =
    document.getElementById(
        "total"
    );


const headerCartCount =
    document.getElementById(
        "headerCartCount"
    );


const checkoutBtn =
    document.getElementById(
        "checkoutBtn"
    );


function readCart() {

    try {

        return JSON.parse(

            localStorage.getItem(
                storageKey
            )

        ) || [];

    }

    catch {

        return [];

    }

}


function writeCart(cart) {

    localStorage.setItem(

        storageKey,

        JSON.stringify(cart)

    );

}


function formatPrice(price) {

    return Number(price || 0)

        .toLocaleString(

            "en-ZA",

            {

                minimumFractionDigits: 2,

                maximumFractionDigits: 2

            }

        );

}


function renderCart() {


    const cart = readCart();


    const itemCount = cart.reduce(

        (sum, item) =>

            sum +

            Number(

                item.quantity || 0

            ),

        0

    );


    const cartTotal = cart.reduce(

        (sum, item) =>

            sum +

            (

                Number(

                    item.price || 0

                )

                *

                Number(

                    item.quantity || 0

                )

            ),

        0

    );


    headerCartCount.textContent =
        itemCount;


    totalItems.textContent =
        itemCount;


    subtotal.textContent =
        `R${formatPrice(cartTotal)}`;


    total.textContent =
        `R${formatPrice(cartTotal)}`;


    if (!cart.length) {


        cartItems.innerHTML = `

            <div class="empty-cart">

                <h2>

                    Your cart is empty.

                </h2>


                <p>

                    Find something you like
                    and add it to your cart.

                </p>


                <a

                    href="shop.html"

                    class="shop-btn"

                >

                    Start Shopping

                </a>

            </div>

        `;


        checkoutBtn.disabled = true;

        checkoutBtn.style.opacity = "0.5";

        checkoutBtn.style.cursor = "not-allowed";


        return;

    }


    checkoutBtn.disabled = false;

    checkoutBtn.style.opacity = "1";

    checkoutBtn.style.cursor = "pointer";


    cartItems.innerHTML = cart.map(

        (item, index) => {


            const itemTotal =

                Number(

                    item.price || 0

                )

                *

                Number(

                    item.quantity || 0

                );


            return `

                <article

                    class="cart-item"

                    data-index="${index}"

                >


                    <img

                        src="${

                            item.image || ""

                        }"

                        alt="${

                            item.name ||

                            "Product"

                        }"

                        class="cart-item-image"

                        onerror="

                            this.style.display='none'

                        "

                    >


                    <div

                        class="cart-item-info"

                    >


                        <div

                            class="cart-item-category"

                        >

                            PLUGSA PRODUCT

                        </div>


                        <h3>

                            ${

                                item.name ||

                                "Unnamed Product"

                            }

                        </h3>


                        <div

                            class="cart-item-details"

                        >

                            Size:

                            <strong>

                                ${

                                    item.size ||

                                    "N/A"

                                }

                            </strong>

                            <br>


                            Colour:

                            <strong>

                                ${

                                    item.color ||

                                    "N/A"

                                }

                            </strong>

                        </div>


                        <div

                            class="cart-item-price"

                        >

                            R${

                                formatPrice(

                                    itemTotal

                                )

                            }

                        </div>


                        <div

                            class="cart-actions"

                        >


                            <div

                                class="quantity-control"

                            >


                                <button

                                    class="decrease-btn"

                                    data-index="${index}"

                                >

                                    −

                                </button>


                                <span>

                                    ${

                                        item.quantity

                                    }

                                </span>


                                <button

                                    class="increase-btn"

                                    data-index="${index}"

                                >

                                    +

                                </button>


                            </div>


                            <button

                                class="remove-btn"

                                data-index="${index}"

                            >

                                Remove

                            </button>


                        </div>


                    </div>


                </article>

            `;

        }

    ).join("");

}


cartItems.addEventListener(

    "click",

    event => {


        const index = Number(

            event.target.dataset.index

        );


        if (

            Number.isNaN(index)

        ) {

            return;

        }


        const cart = readCart();


        if (

            event.target.classList.contains(

                "increase-btn"

            )

        ) {

            cart[index].quantity++;


            writeCart(cart);

            renderCart();

        }


        if (

            event.target.classList.contains(

                "decrease-btn"

            )

        ) {

            cart[index].quantity--;


            if (

                cart[index].quantity <= 0

            ) {

                cart.splice(

                    index,

                    1

                );

            }


            writeCart(cart);

            renderCart();

        }


        if (

            event.target.classList.contains(

                "remove-btn"

            )

        ) {

            cart.splice(

                index,

                1

            );


            writeCart(cart);

            renderCart();

        }

    }

);


checkoutBtn.addEventListener(

    "click",

    () => {


        const cart = readCart();


        if (!cart.length) {

            return;

        }


        window.location.href =

            "checkout.html";

    }

);


renderCart();


window.addEventListener(

    "storage",

    renderCart

);


</script>


</body>

</html>
