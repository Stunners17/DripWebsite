<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Your Cart</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #070707;
            color: #f7f7f7;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html {
            min-height: 100%;
            overflow-x: hidden;
            text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }

        img, picture, video, canvas, svg, iframe {
            max-width: 100%;
            height: auto;
            display: block;
        }

        button, input, select, textarea {
            max-width: 100%;
        }

        .container,
        .products,
        .product-grid,
        .section,
        .image-section,
        .feature-card,
        .product-card,
        .cart-items,
        .summary,
        .request,
        .card,
        .content {
            width: 100%;
        }

        nav {
            background: rgba(0, 0, 0, 0.85);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav a {
            color: #f7f7f7;
            text-decoration: none;
            font-weight: 700;
            margin-left: 1rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .summary {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 30px;
            align-items: center;
        }

        .summary p {
            margin: 0;
            color: #c7c7c7;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .button-group button,
        .button-group a {
            border: 0;
            border-radius: 999px;
            padding: 14px 24px;
            background: #f7ff00;
            color: #080808;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .button-group button:hover,
        .button-group a:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .cart-items {
            display: grid;
            gap: 20px;
        }

        .cart-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 140px 1fr auto;
            gap: 20px;
            padding: 18px;
            align-items: center;
        }

        .cart-item img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 16px;
        }

        .cart-item-details {
            display: grid;
            gap: 8px;
        }

        .cart-item-details h2 {
            margin: 0;
            font-size: 1.1rem;
            letter-spacing: 0.04em;
        }

        .cart-item-details p {
            margin: 0;
            color: #b9b9b9;
        }

        .cart-item-meta {
            text-align: right;
            display: grid;
            gap: 12px;
        }

        .cart-item-meta p {
            margin: 0;
            font-weight: 700;
        }

        .cart-item-meta button {
            background: #ff1f3a;
            color: white;
            border: none;
            border-radius: 999px;
            padding: 10px 18px;
            cursor: pointer;
        }

        .cart-item-meta button:hover {
            background: #e10f2b;
        }

        .empty-state {
            background: rgba(255,255,255,0.05);
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            text-align: center;
        }

        .checkout {
            margin-top: 42px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 30px;
        }

        .checkout h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .checkout p {
            margin: 0 0 24px;
            color: #c7c7c7;
        }

        .checkout-fields {
            display: grid;
            gap: 16px;
            margin-bottom: 24px;
        }

        .checkout-fields label {
            display: grid;
            gap: 8px;
            color: #ddd;
            font-size: 0.95rem;
        }

        .checkout-fields input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.05);
            color: #f7f7f7;
        }

        .checkout-fields input::placeholder {
            color: rgba(255,255,255,0.55);
        }

        #checkout-submit {
            width: 100%;
            border-radius: 999px;
            background: #f7ff00;
            color: #080808;
            border: none;
            padding: 16px 24px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        #checkout-submit:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .checkout.hidden {
            display: none;
        }

        .empty-state p {
            margin: 0;
            color: #c7c7c7;
            line-height: 1.7;
        }

        @media (max-width: 720px) {
            .cart-item {
                grid-template-columns: 1fr;
            }

            .cart-item-meta {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="index.html">Home</a>
            <a href="sneaker.html">Shop</a>
        </div>
        <div>
            <a href="cart.html">Cart</a>
        </div>
    </nav>

    <main class="container">
        <h1>Your Cart</h1>

        <div class="summary">
            <p id="cart-summary">Loading cart items...</p>
            <div class="button-group">
                <a href="sneaker.html">Continue Shopping</a>
                <button id="checkout-btn" type="button">Checkout</button>
                <button id="clear-cart">Clear Cart</button>
            </div>
        </div>

        <div class="cart-items" id="cart-items"></div>

        <section class="checkout" id="checkout-section">
            <h2>Checkout</h2>
            <p>Complete your order details below. The form action can be added later.</p>
            <form id="checkout-form" action="https://formspree.io/f/mlgvezbq" method="POST">
                <input type="hidden" name="cartData" id="cart-data" value="">
                <div class="checkout-fields">
                    <label>Full name
                        <input type="text" name="name" placeholder="Your name" required>
                    </label>
                    <label>Email
                        <input type="email" name="email" placeholder="you@example.com" required>
                    </label>
                    <label>Phone
                        <input type="tel" name="phone" placeholder="+27 71 123 4567" required>
                    </label>
                </div>
                <button type="submit" id="checkout-submit">Submit Order</button>
            </form>
        </section>
    </main>

    <script>
        function getCart() {
            const stored = localStorage.getItem('cart');
            try {
                return stored ? JSON.parse(stored) : [];
            } catch (err) {
                console.warn('Invalid cart data', err);
                localStorage.removeItem('cart');
                return [];
            }
        }

        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
        }

        function formatPrice(value) {
            return 'R' + Number(value).toFixed(2);
        }

        function updateCheckoutSection(cart) {
            const section = document.getElementById('checkout-section');
            const cartInput = document.getElementById('cart-data');
            const submitBtn = document.getElementById('checkout-submit');
            if (!section || !cartInput || !submitBtn) return;
            if (cart.length === 0) {
                section.classList.add('hidden');
                cartInput.value = '';
                submitBtn.disabled = true;
            } else {
                section.classList.remove('hidden');
                cartInput.value = JSON.stringify(cart);
                submitBtn.disabled = false;
            }
        }

        function renderCart() {
            const cart = getCart();
            const container = document.getElementById('cart-items');
            const summary = document.getElementById('cart-summary');

            if (!container || !summary) return;

            container.innerHTML = '';

            if (cart.length === 0) {
                summary.textContent = 'Your cart is empty.';
                container.innerHTML = '<div class="empty-state"><p>You have no items in your cart yet. Add something from the shop to save it in your browser.</p></div>';
                updateCheckoutSection(cart);
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
            const itemCount = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            summary.textContent = `${itemCount} item${itemCount === 1 ? '' : 's'} · Total ${formatPrice(total)}`;

            cart.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'cart-item';

                card.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-item-details">
                        <h2>${item.name}</h2>
                        <p>Size: ${item.size || 'One Size'}</p>
                        <p>Color: ${item.color || 'Default'}</p>
                        <p>Quantity: ${item.quantity || 1}</p>
                        <p>${formatPrice(item.price)}</p>
                    </div>
                    <div class="cart-item-meta">
                        <p>${formatPrice((item.price || 0) * (item.quantity || 1))}</p>
                        <button type="button">Remove</button>
                    </div>
                `;
                const removeBtn = card.querySelector('button');
                removeBtn.addEventListener('click', () => removeItem(index));
                container.appendChild(card);
            });

            updateCheckoutSection(cart);
        }

        function removeItem(index) {
            const cart = getCart();
            cart.splice(index, 1);
            saveCart(cart);
            renderCart();
        }

        function clearCart() {
            saveCart([]);
            renderCart();
        }

        document.getElementById('clear-cart').addEventListener('click', clearCart);
        document.getElementById('checkout-btn').addEventListener('click', function() {
            const section = document.getElementById('checkout-section');
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });
        window.addEventListener('storage', renderCart);
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
