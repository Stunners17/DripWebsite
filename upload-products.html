<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLUGSA Product Uploader</title>

<style>

body{
    background:#050505;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:500px;
    background:#111;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

button{
    width:100%;
    padding:18px;
    font-size:18px;
    background:#FFD700;
    color:black;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    opacity:.9;
}

#status{
    margin-top:25px;
    color:#FFD700;
}

</style>

</head>

<body>

<div class="container">

<h1>PLUGSA Product Uploader</h1>

<p>

This page uploads all existing products into Firestore.

Only use it once.

</p>

<button id="uploadBtn">

Upload Products

</button>

<p id="status">

Waiting...

</p>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs,
query,
where,
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const uploadBtn=document.getElementById("uploadBtn");
const status=document.getElementById("status");

const products = [

{
name:"Urban Script Tee",
image:"images/532daa7acf60562e09aba67620ff258b.jpg",
price:249,
category:"graphic-tees",
sizes:["S","M","L","XL"],
colors:["Black","White"]
},

{
name:"Retro Script Tee",
image:"images/graphic-tee1.jpg",
price:219,
category:"graphic-tees",
sizes:["S","M","L","XL"],
colors:["Black","Grey","White"]
},

{
name:"Gangstars Tee",
image:"images/graphic-tee2.jpg",
price:249,
category:"graphic-tees",
sizes:["S","M","L"],
colors:["Black","White"]
},

{
name:"Abstract Lines Tee",
image:"images/graphic-tee3.png",
price:249,
category:"graphic-tees",
sizes:["S","M","L"],
colors:["Black","White"]
},

{
name:"Tick Tock Boy Tee",
image:"images/tick-tock-boy-graphic-tee.png",
price:249,
category:"graphic-tees",
sizes:["S","M","L"],
colors:["Black","White"]
},

{
name:"Nasa Tee",
image:"images/graphic-tee4.jpg",
price:199,
category:"graphic-tees",
sizes:["S","M","L"],
colors:["White","Black"]
},

{
name:"Signature Print Tee",
image:"images/graphic-tee5.jpg",
price:299,
category:"graphic-tees",
sizes:["S","M","L"],
colors:["Black","White"]
}

];

uploadBtn.onclick=async()=>{

try{

status.textContent="Uploading...";

for(const product of products){

await addDoc(collection(db,"products"),{

...product,

brand:"PLUGSA",

status:"active",

stock:50,

featured:false,

createdAt:serverTimestamp()

});

}

status.textContent="Upload Complete!";

}

catch(error){

console.error(error);

status.textContent="Error: "+error.message;

}

};

</script>

</body>
</html>
