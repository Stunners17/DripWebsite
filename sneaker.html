<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050505">
<title>PLUGSA | Sneakers</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --bg:#050505; --surface:#111111; --accent:#f7ff00; --text:#ffffff; --muted:#b3b3b3; --border:rgba(255,255,255,.12); }
* { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; font-size:clamp(14px,1.1vw,18px); }
body { font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; }
a { color:inherit; text-decoration:none; }
button,input,select { font:inherit; }
.navbar { position:sticky; top:0; z-index:1000; display:flex; align-items:center; justify-content:space-between; padding:clamp(16px,2vw,28px) clamp(4%,3vw,8%); background:rgba(5,5,5,.94); backdrop-filter:blur(16px); border-bottom:1px solid var(--border); }
.logo { font-size:1.7rem; font-weight:800; letter-spacing:.36em; text-transform:uppercase; color:var(--accent); }
.nav-links { display:flex; gap:20px; align-items:center; }
.nav-links a { color:var(--text); font-weight:500; transition:.25s ease; }
.nav-links a:hover,.nav-links a.active { color:var(--accent); }
.cart-pill { background:rgba(247,255,0,.14); padding:8px 12px; border-radius:999px; border:1px solid rgba(247,255,0,.18); display:inline-flex; align-items:center; gap:6px; }
.hero { padding:clamp(90px,10vw,120px) clamp(6%,4vw,8%) clamp(40px,5vw,60px); text-align:center; background:linear-gradient(90deg, rgba(5,5,5,.92), rgba(5,5,5,.75)), url('images/Red And White J4 Cover.jpg') center/cover no-repeat; }
.hero > div { max-width:min(860px,100%); margin:0 auto; }
.hero h1 { font-size:clamp(2.6rem, 5vw, 3.8rem); color:var(--accent); margin-bottom:12px; letter-spacing:.16em; text-transform:uppercase; }
.hero p { color:var(--muted); max-width:min(760px,100%); margin:0 auto; }
.controls { padding:clamp(20px,2vw,28px) clamp(6%,4vw,8%) clamp(12px,1.2vw,16px); display:grid; gap:clamp(16px,1.5vw,20px); grid-template-columns:1fr .8fr .8fr; align-items:center; }
.search-box, .filter-box, .sort-box { background:var(--surface); border:1px solid var(--border); border-radius:999px; padding:clamp(12px,1vw,16px) clamp(14px,1.4vw,18px); color:var(--text); }
.products { padding:clamp(28px,3vw,38px) clamp(6%,4vw,8%) clamp(40px,5vw,70px); display:grid; grid-template-columns:repeat(auto-fit,minmax(270px,1fr)); gap:clamp(20px,1.5vw,24px); }
.product-card { background:var(--surface); border:1px solid var(--border); border-radius:24px; overflow:hidden; transition:transform .3s ease, border-color .3s ease; box-shadow:0 18px 45px rgba(0,0,0,.26); }
.product-card:hover { transform:translateY(-6px); border-color:rgba(247,255,0,.35); }
.product-card img { height:clamp(260px,24vw,320px); object-fit:cover; }
.badge { display:inline-block; margin:clamp(16px,1.5vw,18px) clamp(16px,1.5vw,18px) 0; padding:clamp(6px,0.9vw,10px) clamp(10px,1vw,14px); border-radius:999px; font-size:clamp(.72rem,0.9vw,.9rem); letter-spacing:.16em; background:rgba(247,255,0,.12); color:var(--accent); }
.inner { padding:clamp(18px,1.4vw,20px) clamp(16px,1.4vw,18px) clamp(18px,1.4vw,20px); display:flex; flex-direction:column; gap:clamp(12px,1vw,14px); }
.inner h3 { font-size:1.15rem; }
.meta { color:var(--muted); font-size:.94rem; }
.row { display:flex; gap:10px; flex-wrap:wrap; }
.select, .qty { padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:#171717; color:var(--text); }
.qty { width:80px; }
.btn { border:none; border-radius:999px; padding:12px 14px; background:var(--accent); color:#050505; font-weight:700; cursor:pointer; transition:transform .2s ease; }
.btn:hover { transform:translateY(-2px); }
.btn-ghost { background:transparent; color:var(--text); border:1px solid var(--border); }
.section { padding:0 8% 30px; }
.panel { background:linear-gradient(145deg, rgba(17,17,17,.95), rgba(7,7,7,.96)); border:1px solid var(--border); border-radius:24px; padding:22px; margin-bottom:24px; }
.panel h3 { margin-bottom:8px; color:var(--accent); }
.empty { color:var(--muted); text-align:center; padding:36px 0 0; }
@media (max-width:760px) { .navbar { flex-direction:column; gap:12px; padding:16px 6%; } .nav-links { flex-wrap:wrap; justify-content:center; } .hero, .controls, .products, .section { padding-left:6%; padding-right:6%; } .hero { padding:90px 6% 40px; } .controls { grid-template-columns:1fr; } }
</style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">PLUGSA</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="hoodies.html">Hoodies</a>
    <a href="graphic-tees.html">Graphic Tees</a>
    <a href="fitted caps.html">Caps</a>
    <a class="active" href="sneaker.html">Sneakers</a>
    <a href="cart.html" class="cart-pill">Cart <span data-cart-count>0</span></a>
  </div>
</nav>
<header class="hero">
  <div>
    <h1>Sneakers</h1>
    <p>Luxury performance, bold silhouettes, and rare drops in a polished marketplace setting.</p>
  </div>
</header>
<div class="section">
  <div class="panel">
    <h3>Trending Sneaker Drop</h3>
    <p>Fresh silhouettes with premium detailing landing now. Limited pairs are ready for the next rotation.</p>
  </div>
</div>
<div class="controls">
  <input id="searchInput" class="search-box" type="search" placeholder="Search sneakers" aria-label="Search sneakers">
  <select id="filterSelect" class="filter-box" aria-label="Filter by category">
    <option value="all">All Categories</option>
    <option value="trending">Trending</option>
    <option value="limited">Limited</option>
    <option value="classic">Classic</option>
  </select>
  <select id="sortSelect" class="sort-box" aria-label="Sort sneakers">
    <option value="featured">Featured</option>
    <option value="az">Name A-Z</option>
    <option value="za">Name Z-A</option>
  </select>
</div>
<div class="products" id="productsGrid"></div>
<script>
const storageKey='plugsa-cart';
function readCart(){ try{return JSON.parse(localStorage.getItem(storageKey))||[]}catch(e){return [];} }
function writeCart(cart){ localStorage.setItem(storageKey, JSON.stringify(cart)); }
function updateCartCount(){ const cart=readCart(); document.querySelectorAll('[data-cart-count]').forEach((el)=>{ el.textContent=cart.reduce((total,item)=>total+item.quantity,0); }); }
updateCartCount();
window.addEventListener('storage', updateCartCount);
window.addEventListener('focus', updateCartCount);
const sneakers=[
  {name:'Jordan 1 Black & White', badge:'50% OFF', category:'trending', image:'images/Black And White J1.jpg', price:6000, salePrice:3000, discount:'50% OFF', colors:['White','Black'], sizes:['6','7','8','9','10']},
  {name:'Jordan 1 Red & White', badge:'50% OFF', category:'trending', image:'images/Red And White J1.jpg', price:6000, salePrice:3000, discount:'50% OFF', colors:['White','Red'], sizes:['6','7','8','9','10']},
  {name:'Nike Shox Classic', badge:'50% OFF', category:'limited', image:'images/Nike Shox.jpg', price:6000, salePrice:3000, discount:'50% OFF', colors:['Black','White'], sizes:['6','7','8','9']},
  {name:'Nike Shox Black', badge:'50% OFF', category:'limited', image:'images/Black Nike Shox.jpg', price:6000, salePrice:3000, discount:'50% OFF', colors:['Black','Silver'], sizes:['6','7','8','9']},
  {name:'Adidas Campus 00s', badge:'50% OFF', category:'classic', image:'images/Adidas Cumpus.jpg', price:1999.99, salePrice:999.99, discount:'50% OFF', colors:['Cream','Navy'], sizes:['6','7','8','9','10']},
  {name:'Nike Dunk Red', badge:'SALE', category:'classic', image:'images/Red And White Dunk.jpg', price:1199.99, colors:['Red','White'], sizes:['6','7','8','9']},
  {name:'Nike Dunk Black', badge:'SALE', category:'classic', image:'images/Black And white dunk.jpg', price:1199.99, colors:['Black','White'], sizes:['6','7','8','9']},
  {name:'Air More Uptempo', badge:'10% OFF', category:'limited', image:'images/Black And White UpTempo.jpg', price:2222, salePrice:2000, discount:'10% OFF', colors:['Black','White'], sizes:['6','7','8','9']},
  {name:'Nike Airforce 1', badge:'30% OFF', category:'trending', image:'images/Airforce 1.jpg', price:2857, salePrice:2000, discount:'30% OFF', colors:['White','Black'], sizes:['7','8','9','10']},
  {name:'Jordan 4 Black & White', badge:'10% OFF', category:'trending', image:'images/Black And White J4.jpg', price:3333, salePrice:3000, discount:'10% OFF', colors:['Black','White'], sizes:['7','8','9','10']},
  {name:'Jordan 4 Red & White', badge:'10% OFF', category:'trending', image:'images/Red And White J4.jpg', price:3333, salePrice:3000, discount:'10% OFF', colors:['Red','White'], sizes:['7','8','9','10']},
  {name:'Adidas Samba', badge:'NEW', category:'classic', image:'images/Adidas Cumpus (2).jpg', price:999.99, colors:['Black','White'], sizes:['6','7','8','9']},
  {name:'New Balance', badge:'60% OFF', category:'classic', image:'images/cover.jpg', price:7500, salePrice:3000, discount:'60% OFF', colors:['Black','White'], sizes:['6','7','8','9']},
  {name:'Black & White Diesel', badge:'109% OFF', category:'classic', image:'images/cover.jpg', price:6000, salePrice:3000, discount:'109% OFF', colors:['Black','White'], sizes:['6','7','8','9']},
  {name:'Lacoste', badge:'NEW', category:'classic', image:'images/cover.jpg', price:2499.99, colors:['Green','White'], sizes:['6','7','8','9']},
  {name:'Nike Air Max', badge:'NEW', category:'classic', image:'images/cover.jpg', price:2499.99, colors:['Black','White'], sizes:['6','7','8','9']},
  {name:'Air More Uptempo Red', badge:'NEW', category:'limited', image:'images/Black And Red UpTempo.jpg', price:3199, colors:['Black','Red'], sizes:['6','7','8','9','10']},
  {name:'Air More Uptempo Mono', badge:'NEW', category:'limited', image:'images/White And Black UpTempo.jpg', price:2999, colors:['White','Black'], sizes:['6','7','8','9','10']},
  {name:'Nike Airforce 1 Green', badge:'NEW', category:'trending', image:'images/Green And White Airforce 1.jpg', price:2699, colors:['Green','White'], sizes:['7','8','9','10']},
  {name:'Jordan 1 Purple & White', badge:'NEW', category:'trending', image:'images/Purple And White J1.jpg', price:2999, colors:['Purple','White'], sizes:['6','7','8','9','10']},
  {name:'Jordan 4 Three Colour', badge:'NEW', category:'trending', image:'images/Three colour J4.jpg', price:3399, colors:['Red','Blue'], sizes:['7','8','9','10']}
];
const grid=document.getElementById('productsGrid');
const searchInput=document.getElementById('searchInput');
const filterSelect=document.getElementById('filterSelect');
const sortSelect=document.getElementById('sortSelect');
function renderProducts(){
  const search=searchInput.value.toLowerCase();
  const filter=filterSelect.value;
  let filtered=[...sneakers].filter((item)=>item.name.toLowerCase().includes(search) && (filter==='all'||item.category===filter));
  if(sortSelect.value==='az') filtered.sort((a,b)=>a.name.localeCompare(b.name));
  if(sortSelect.value==='za') filtered.sort((a,b)=>b.name.localeCompare(a.name));
  if(filtered.length===0){ grid.innerHTML='<div class="empty">No sneakers match your search.</div>'; return; }
  grid.innerHTML=filtered.map((item)=>`<article class="product-card">
    <img src="${item.image}" alt="${item.name}">
    <div class="badge">${item.badge}</div>
    <div class="inner">
      <h3>${item.name}</h3>
      <p class="meta">Premium street-runner • elevated comfort</p>
      ${item.salePrice ? `<div class="price-row"><span class="price">R ${item.salePrice}</span><span class="original">R ${item.price}</span></div><div class="sale-tag">${item.discount}</div>` : `<div class="price-row"><span class="price">R ${item.price}</span></div>`}
      <div class="row">
        <select class="select" aria-label="Select size">
          ${item.sizes.map((size)=>`<option>${size}</option>`).join('')}
        </select>
        <select class="select" aria-label="Select color">
          ${item.colors.map((color)=>`<option>${color}</option>`).join('')}
        </select>
      </div>
      <div class="row">
        <input class="qty" type="number" min="1" max="9" value="1" aria-label="Quantity">
        <button class="btn add-to-cart" data-name="${item.name}" data-price="${item.salePrice || item.price}" data-image="${item.image}" type="button">Add to cart</button>
      </div>
      <button class="btn btn-ghost wishlist-btn" type="button">♡ Wishlist</button>
    </div>
  </article>`).join('');
}
renderProducts();
[searchInput,filterSelect,sortSelect].forEach((el)=>el.addEventListener('input', renderProducts));
[searchInput,filterSelect,sortSelect].forEach((el)=>el.addEventListener('change', renderProducts));
document.addEventListener('click', (event)=>{
  if(event.target.classList.contains('add-to-cart')){
    const btn=event.target; const card=btn.closest('.product-card'); const qtyInput=card.querySelector('.qty'); const sizeSelect=card.querySelectorAll('.select')[0]; const colorSelect=card.querySelectorAll('.select')[1];
    const product={ name:btn.dataset.name, price:Number(btn.dataset.price), image:btn.dataset.image, size:sizeSelect.value, color:colorSelect.value, quantity:Number(qtyInput.value)||1 };
    const cart=readCart(); const existing=cart.find((entry)=>entry.name===product.name && entry.size===product.size && entry.color===product.color); if(existing){ existing.quantity += product.quantity; } else { cart.push(product); }
    writeCart(cart); updateCartCount(); btn.textContent='Added'; setTimeout(()=>{ btn.textContent='Add to cart'; },900);
  }
  if(event.target.classList.contains('wishlist-btn')){ event.target.textContent='♥ Saved'; setTimeout(()=>{ event.target.textContent='♡ Wishlist'; },900); }
});
</script>
</body>
</html>
