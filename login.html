Save this as **`login.html`**.

```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050505">
<title>PLUGSA | Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#050505;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Animated Background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.08), transparent 30%),
    radial-gradient(circle at 80% 80%, rgba(255,255,255,.06), transparent 30%);
    animation:move 10s linear infinite alternate;
}

@keyframes move{
    from{transform:translateY(-20px);}
    to{transform:translateY(20px);}
}

.login-card{
    position:relative;
    width:420px;
    max-width:92%;
    background:rgba(20,20,20,.9);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.6);
    z-index:1;
}

.logo{
    text-align:center;
    font-size:2rem;
    font-weight:900;
    letter-spacing:4px;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#999;
    margin-bottom:35px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:.95rem;
}

.input-group input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#111;
    color:#fff;
    outline:none;
    border:1px solid #333;
    transition:.3s;
}

.input-group input:focus{
    border-color:#fff;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:.9rem;
    margin:20px 0;
}

.options a{
    color:#fff;
    text-decoration:none;
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#fff;
    color:#000;
    font-weight:bold;
    font-size:1rem;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
}

.divider{
    text-align:center;
    margin:25px 0;
    color:#777;
}

.social-login{
    display:grid;
    gap:12px;
}

.social-btn{
    padding:13px;
    border-radius:10px;
    border:1px solid #333;
    background:#111;
    color:#fff;
    cursor:pointer;
    transition:.3s;
}

.social-btn:hover{
    background:#1a1a1a;
}

.signup{
    margin-top:25px;
    text-align:center;
    color:#888;
}

.signup a{
    color:#fff;
    text-decoration:none;
}

.error{
    color:#ff4d4d;
    text-align:center;
    margin-bottom:15px;
    display:none;
}
</style>
</head>

<body>

<div class="login-card">

<div class="logo">PLUGSA</div>
<p class="subtitle">Sign in to continue shopping.</p>

<div class="error" id="error">
Invalid email or password.
</div>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input
type="email"
id="email"
placeholder="Enter your email"
required>
</div>

<div class="input-group">
<label>Password</label>
<input
type="password"
id="password"
placeholder="Enter your password"
required>
</div>

<div class="options">
<label>
<input type="checkbox">
 Remember me
</label>

<a href="#">Forgot Password?</a>
</div>

<button class="login-btn" type="submit">
Login
</button>

</form>

<div class="divider">
OR
</div>

<div class="social-login">
<button class="social-btn">
Continue with Google
</button>


<div class="signup">
Don't have an account?
<a href="signup.html">Create Account</a>
</div>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(email===""||password===""){
document.getElementById("error").style.display="block";
return;
}

localStorage.setItem("plugsaUserLoggedIn","true");
localStorage.setItem("plugsaUserEmail",email);

window.location.href="checkout.html";

});
</script>

</body>
</html>
```
