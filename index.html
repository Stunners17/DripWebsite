<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLUGSA - From the Streets to Your Closet</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #080808;
            --surface: rgba(22, 22, 22, 0.94);
            --surface-strong: #111;
            --text: #f7f7f7;
            --muted: #c7c7c7;
            --accent: #f7ff00;
            --accent-dark: #e2b800;
            --danger: #ff1f3a;
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            line-height: 1.6;
            color: var(--text);
            background: radial-gradient(circle at top, rgba(247, 255, 0, 0.1), transparent 25%),
                        linear-gradient(180deg, #050505 0%, #0f0f0f 100%);
            min-height: 100vh;
        }

        header {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
            position: relative;
            overflow: hidden;
            color: var(--text);
        }

        header::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.9)),
                url(images/cover\ photo\ .jpg) center/cover no-repeat;
            filter: brightness(0.7) contrast(1.1);
            transform: scale(1.05);
            z-index: 0;
        }

        header * {
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-size: clamp(3.5rem, 9vw, 6.5rem);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 1rem;
            line-height: 1;
        }

        header p {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        nav {
            background: rgba(10, 10, 10, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 18px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            padding: 10px 16px;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            transition: transform 0.2s ease, color 0.2s ease, background 0.2s ease;
        }

        nav a:hover {
            color: var(--accent);
            transform: translateY(-1px);
        }

        .menu-icon {
            width: 32px;
            cursor: pointer;
            position: absolute;
            top: 18px;
            right: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 24px;
        }

        .menu-icon div {
            height: 3px;
            background-color: var(--text);
            border-radius: 2px;
        }

        .menu {
            display: none;
            position: absolute;
            top: 62px;
            right: 20px;
            background: #111;
            width: 220px;
            padding: 18px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: var(--shadow);
        }

        .menu a {
            display: block;
            text-decoration: none;
            color: var(--text);
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .menu a:last-child {
            border-bottom: none;
        }

        .article {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.06));
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.38);
            border-radius: 28px;
            padding: 40px;
            margin: 40px 20px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 36px;
            align-items: center;
            overflow: hidden;
        }

        .article img {
            width: 100%;
            height: 360px;
            object-fit: cover;
            border-radius: 18px;
            filter: saturate(1.05) contrast(1.05);
        }

        .article button {
            width: auto;
            padding: 18px 36px;
            margin-top: 24px;
            background: transparent;
            color: var(--text);
            border: 2px solid var(--accent);
            border-radius: 999px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-weight: 800;
            transition: background 0.25s ease, transform 0.25s ease, color 0.25s ease;
            box-shadow: 0 18px 35px rgba(0, 0, 0, 0.25);
        }

        .article button:hover {
            background: rgba(247, 255, 0, 0.12);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .article h2 {
            font-size: clamp(2.4rem, 4vw, 3.6rem);
            margin-bottom: 1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text);
        }

        .article p {
            font-size: 1rem;
            line-height: 1.9;
            color: var(--muted);
            max-width: 38rem;
        }

        .request {
            background: #090909;
            color: var(--text);
            padding: 60px 24px;
            text-align: center;
            margin: 40px 20px 60px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 26px;
        }

        .request h2 {
            font-size: clamp(2rem, 3vw, 2.8rem);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .request p {
            margin-bottom: 24px;
            font-size: 1.05rem;
            color: var(--muted);
        }

        .request input,
        .request textarea {
            width: 100%;
            max-width: 520px;
            padding: 16px 18px;
            margin: 10px auto;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-size: 1rem;
        }

        .request textarea {
            resize: vertical;
            min-height: 130px;
        }

        button,
        .btn {
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-weight: 800;
            background: linear-gradient(135deg, rgba(247, 255, 0, 0.9), rgba(255, 31, 58, 0.95));
            color: #080808;
            border: none;
            border-radius: 999px;
            padding: 16px 32px;
            cursor: pointer;
            box-shadow: 0 18px 35px rgba(255, 31, 58, 0.22);
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        button:hover,
        .btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        html {
            scroll-behavior: smooth;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        footer {
            background: #0b0b0b;
            color: var(--muted);
            text-align: center;
            padding: 28px 20px;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        footer p {
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        @media (max-width: 900px) {
            .article {
                grid-template-columns: 1fr;
                padding: 28px;
            }

            .article img {
                height: 280px;
            }
        }

        @media (max-width: 640px) {
            nav {
                justify-content: center;
                padding: 14px 18px;
            }

            header h1 {
                font-size: 4rem;
            }

            .menu-icon {
                top: 14px;
                right: 18px;
            }

            .article {
                margin: 24px 14px;
                gap: 24px;
            }

            .request {
                margin: 24px 14px 48px;
            }
        }
    </style>
</head>

<body>
    
    <header>
        <h1>THE PLUGS</h1>
        <p>From the Streets to Your Closet</p>

    <button onclick="document.getElementById('products').scrollIntoView({behavior:'smooth'})">
    Shop Now
    </button>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="refer.html">Refer A Friend</a>
        <a href="#gallery">Gallery</a>

        <a href="cart.html" class="cart">
        🛒
        </a>

        <!--Hamburger Menu-->
        <div class="menu-icon" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <!--Menu-->
        <div class="menu" id="menu">
            <a href="refer.html">Refer A Friend</a>
            <a href="code.html">Codes</a>
            <a href="services.html">Services</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <section class="article" id="products">

    <img src="images/Blaack And White J4.jpg" alt="SNEAKERS">

    <div>
        

        <button onclick="window.location.href='sneaker.html'">
            OUR SNEAKER COLLECTION
        </button>
    </div>

    </section>

    <section class="article">

    <img src="images/fitted.jpg" alt="CAPS">

    <div>
    
        <button onclick="window.location.href='fitted caps.html'">
            OUR CAPS COLLECTION
        </button>
    </div>

    </section>

    <section class="article">

    <img src="images/532daa7acf60562e09aba67620ff258b.jpg" alt="Graphic tee">

    <div>
    
        <button onclick="window.location.href='fitted caps.html'">
            GRAPHIC TEE
        </button>
    </div>

    </section>

    <section class="article">

    <img src="images/Track pants.jpg" alt="pants">

    <div>
    
        <button onclick="window.location.href='#'">
            PANTS AND JEANS
        </button>
    </div>

    </section>


    <!--Request an item-->
    <section class="request" id="request">
        <h2>Can't Find What You're Looking For?</h2>

        <form action="https://formspree.io/f/mlgvezbq" method="POST">
            <p>Let us know what you're looking for!</p>

            <input
                type="text"
                name="item"
                placeholder="Enter the item you want"
                required
            >

            <input
                type="text"
                name="whatapp"
                placeholder="Enter your WhatsApp number"
                required
            >

            <textarea
                id="details"
                placeholder="Any specific details? (optional)"
                name="details"
            ></textarea>

            <br><br>

            <button type="submit" class="btn">
                Send Request
            </button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 THE PLUGS. All rights reserved.</p>
        <p>Designed and Developed by THE PLUGS Team</p>
    </footer>

    <script>
        function toggleMenu() {
            var menu = document.getElementById("menu");

            if (menu.style.display === "block") {
                menu.style.display = "none";
            } else {
                menu.style.display = "block";
            }
        }
    </script>
</body>

</html>
