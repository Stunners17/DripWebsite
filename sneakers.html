<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Sneakers — Coming Soon</title>
	<style>
		/* Styles matched to hoodies.html (replicated) */
		:root{
			--bg:#0f1724;
			--card:#0b1220;
			--accent:#e11d48;
			--muted:#94a3b8;
			--glass: rgba(255,255,255,0.03);
			--radius:12px;
			--maxw:900px;
			--font-sans: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
		}
		html,body{height:100%;}
		body{
			margin:0;
			background:linear-gradient(180deg,var(--bg),#041022 60%);
			color:#e6eef8;
			font-family:var(--font-sans);
			display:flex;
			align-items:center;
			justify-content:center;
			padding:32px;
		}
		.container{
			width:100%;
			max-width:var(--maxw);
			background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
			border:1px solid rgba(255,255,255,0.04);
			border-radius:var(--radius);
			padding:48px;
			box-shadow: 0 10px 30px rgba(2,6,23,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
			display:flex;
			gap:32px;
			align-items:center;
		}
		.left{
			flex:1;
		}
		.badge{
			display:inline-block;
			background:var(--glass);
			padding:6px 12px;
			color:var(--muted);
			font-size:13px;
			border-radius:999px;
			margin-bottom:18px;
			border:1px solid rgba(255,255,255,0.02);
		}
		h1{
			margin:0 0 12px 0;
			font-size:36px;
			letter-spacing:-0.02em;
			line-height:1.05;
		}
		p.lead{
			margin:0 0 20px 0;
			color:var(--muted);
			font-size:16px;
		}
		.email-row{
			display:flex;
			gap:12px;
			max-width:560px;
		}
		input[type="email"]{
			flex:1;
			padding:12px 14px;
			background:transparent;
			border:1px solid rgba(255,255,255,0.06);
			color:inherit;
			border-radius:10px;
			outline:none;
			font-size:15px;
		}
		button.primary{
			background:linear-gradient(90deg,var(--accent),#fb7185);
			color:white;
			border:0;
			padding:12px 16px;
			border-radius:10px;
			font-weight:600;
			cursor:pointer;
		}
		.right{
			width:320px;
			display:flex;
			align-items:center;
			justify-content:center;
		}
		.sneaker-mock{
			width:260px;
			height:160px;
			background:linear-gradient(135deg,#071427 0%, #092336 100%);
			border-radius:14px;
			border:1px solid rgba(255,255,255,0.03);
			display:flex;
			align-items:center;
			justify-content:center;
			color:var(--muted);
			font-weight:700;
			letter-spacing:1px;
			transform:rotate(-6deg);
			box-shadow: 0 8px 30px rgba(2,6,23,0.6);
		}
		footer.small{margin-top:18px;color:var(--muted);font-size:13px}
		@media (max-width:800px){
			.container{flex-direction:column; padding:28px}
			.right{width:100%}
			h1{font-size:28px}
		}
	</style>
</head>
<body>
	<main class="container" role="main">
		<div class="left">
			<div class="badge">Sneakers</div>
			<h1>Coming Soon</h1>
			<p class="lead">Our new sneaker drop is on the way. Join the waitlist to get notified the moment it drops.</p>
			<form class="email-row" onsubmit="event.preventDefault(); alert('Thanks — you\'ll be notified.');">
				<input type="email" placeholder="Enter your email" required />
				<button class="primary" type="submit">Notify me</button>
			</form>
			<div class="small footer" style="margin-top:12px;color:var(--muted)">Limited quantities. Sign up to secure early access.</div>
		</div>
		<div class="right">
			<div class="sneaker-mock">SNEAKERS</div>
		</div>
	</main>
</body>
</html>
