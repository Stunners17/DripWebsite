<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sneaker QR Code Verification</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .page {
      width: 100%;
      max-width: 960px;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      margin-top: 0;
      color: #fff;
      text-align: center;
      font-size: 2rem;
    }
    p {
      line-height: 1.5;
      color: #ddd;
    }
    .scanner {
      margin: 20px auto;
      width: 100%;
      max-width: 640px;
      border: 2px solid #444;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
    }
    #reader {
      width: 100%;
      min-height: 360px;
    }
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0;
      justify-content: center;
    }
    button {
      background: #1a73e8;
      border: none;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s ease;
    }
    button:hover {
      background: #1664c1;
    }
    #result {
      background: #161616;
      border: 1px solid #333;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
      color: #eee;
      word-break: break-word;
    }
    #result a {
      color: #7fe0ff;
      text-decoration: none;
    }
    #result a:hover {
      text-decoration: underline;
    }
    .note {
      color: #a9a9a9;
      font-size: 0.95rem;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>Sneaker QR Code Verification</h1>
    <p>Point your camera at the QR code on your sneakers. The scanner works like a real mobile phone QR reader and will detect URLs that verify the product and send you to the sneaker website or purchase page.</p>
    <div class="scanner">
      <div id="reader"></div>
    </div>
    <div class="controls">
      <button id="start-scan">Start Camera</button>
      <button id="stop-scan" disabled>Stop Camera</button>
    </div>
    <div id="result">
      <p class="note">Scan a sneaker QR code to see the result here.</p>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.9/minified/html5-qrcode.min.js"></script>
  <script>
    const resultEl = document.getElementById('result');
    const startButton = document.getElementById('start-scan');
    const stopButton = document.getElementById('stop-scan');
    const html5QrCode = new Html5Qrcode('reader');
    let activeScanner = false;

    function showMessage(message, isError) {
      resultEl.innerHTML = `<p style="color: ${isError ? '#f66' : '#b8ffd1'}; margin:0;">${message}</p>`;
    }

    function renderResult(text) {
      let isUrl = false;
      try {
        const parsed = new URL(text);
        isUrl = true;
        resultEl.innerHTML = `
          <p>QR code detected.</p>
          <p><strong>URL:</strong> <a href="${parsed.href}" target="_blank" rel="noopener noreferrer">${parsed.href}</a></p>
          <p>Tap the link above to open the sneaker website or purchase page.</p>
        `;
      } catch (error) {
        resultEl.innerHTML = `
          <p>QR code detected, but the content is not a valid URL.</p>
          <p><strong>Data:</strong> ${text}</p>
          <p>If the code is meant to be a purchase link, scan again with a different QR code or use a verified sneaker site's QR label.</p>
        `;
      }
    }

    function startCamera() {
      if (activeScanner) return;
      Html5Qrcode.getCameras().then(cameras => {
        if (!cameras || cameras.length === 0) {
          showMessage('No camera found on this device.', true);
          return;
        }
        const preferredCamera = cameras.find(cam => /rear|back|environment/i.test(cam.label)) || cameras[0];
        const cameraId = preferredCamera.id;

        html5QrCode.start(
          cameraId,
          {
            fps: 15,
            qrbox: 280,
            videoConstraints: {
              facingMode: 'environment'
            }
          },
          decodedText => {
            renderResult(decodedText);
            stopCamera();
          },
          errorMessage => {
            // Ignore intermittent scan errors while camera is active.
          }
        ).then(() => {
          activeScanner = true;
          startButton.disabled = true;
          stopButton.disabled = false;
          showMessage('Scanning... hold the sneaker QR code in front of the camera.', false);
        }).catch(err => {
          showMessage('Unable to start the camera: ' + err, true);
        });
      }).catch(err => {
        showMessage('Camera access denied or unavailable: ' + err, true);
      });
    }

    function stopCamera() {
      if (!activeScanner) return;
      html5QrCode.stop().then(() => {
        activeScanner = false;
        startButton.disabled = false;
        stopButton.disabled = true;
      }).catch(err => {
        console.warn('Failed to stop camera', err);
      });
    }

    startButton.addEventListener('click', startCamera);
    stopButton.addEventListener('click', stopCamera);
  </script>
</body>
</html>
