<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Product | PLUGSA</title><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="storefront.css"></head><body class="storefront"><header class="store-nav"><a class="wordmark" href="index.html">PLUGSA</a><nav><a href="shop.html">Shop all</a><a href="hoodies.html">Hoodies</a><a href="graphic-tees.html">Graphic tees</a><a href="sneaker.html">Sneakers</a></nav><a class="cart-link" href="cart.html">Bag <span data-cart-count>0</span></a></header><main id="product"></main><section class="related"><div class="section-title"><h2>You may also like.</h2><p>More from this category.</p></div><div class="product-grid" id="related"></div></section><script type="module">import{products,card,bindCards,money,add}from'./storefront.js';import{auth}from'./firebase.js';import{redirectToLogin}from'./auth-guard.js';const all=await products(),id=new URLSearchParams(location.search).get('id'),p=all.find(x=>x.id===id||x.name===id);const target=document.querySelector('#product');if(!p){target.innerHTML='<div class="shop-shell"><h1>Product not found.</h1><p><a href="shop.html">Return to the shop</a></p></div>'}else{const price=p.salePrice||p.price;target.innerHTML=`<div class="details"><div class="details-image"><img src="${p.image||'images/cover.jpg'}" alt="${p.name}"/></div><div class="details-copy"><span class="eyebrow" style="color:#0b0b0c">${p.category||'PLUGSA'}</span><h1>${p.name}</h1><h2>${money(price)}${p.salePrice?` <span class="old-price">${money(p.price)}</span>`:''}</h2><p>${p.description||'A considered PLUGSA piece, selected for the everyday rotation.'}</p><p>${Number(p.stock)>0?`${p.stock} available`:'Availability confirmed at checkout'}</p><div class="choices"><select id="size">${(p.sizes?.length?p.sizes:['One Size']).map(x=>`<option>${x}</option>`).join('')}</select><select id="color">${(p.colors?.length?p.colors:['Default']).map(x=>`<option>${x}</option>`).join('')}</select><input class="quantity" id="qty" type="number" min="1" max="${p.stock||99}" value="1" aria-label="Quantity"></div><div class="buy-row"><button class="button" id="add">Add to bag</button><button class="button lime" id="buy">Buy now</button></div><p style="margin-top:26px;font-size:.82rem">Reviews and ratings will be shown here when verified customer feedback is available.</p></div></div>`;for(const [key,next] of [['add',false],['buy',true]])document.querySelector('#'+key).onclick=()=>{if(!auth.currentUser){redirectToLogin(`product.html?id=${encodeURIComponent(id)}`);return}add({...p,size:size.value,color:color.value},qty.value);if(next)location.href='cart.html';else document.querySelector('#add').textContent='Added to bag'};document.querySelector('#related').innerHTML=all.filter(x=>x.id!==p.id&&x.category===p.category).slice(0,4).map(card).join('')||'<div class="empty-state">More products coming soon.</div>'}bindCards();</script></body></html>
